services:
  # ============================================================
  # Backend — all microservices + gateway in one container
  # ============================================================
  - type: web
    name: acm-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: GATEWAY_PORT
        value: 3000
      - key: AUTH_SERVICE_ADDR
        value: 127.0.0.1:50051
      - key: USER_SERVICE_ADDR
        value: 127.0.0.1:50052
      - key: PROJECT_SERVICE_ADDR
        value: 127.0.0.1:50053
      - key: ASSET_SERVICE_ADDR
        value: 127.0.0.1:50054
      - key: NOTIFICATION_SERVICE_ADDR
        value: 127.0.0.1:50055
      - key: FIREBASE_PROJECT_ID
        value: acmdigitalprojectrepository
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@acmdigitalprojectrepository.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: djgs90vay
      - key: CLOUDINARY_API_KEY
        value: "499964857766371"
      - key: CLOUDINARY_API_SECRET
        sync: false
